<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعلانات يومية لتطبيقك</title>
    <meta name="description" content="إعلانات عربية يومية لتغريدات X، إنستقرام، وتيك توك مجانية تمامًا.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>📢 إعلانات يومية جاهزة</h1>
            <p>انسخ وانشر مباشرة لتطبيقك!</p>
        </div>
    </header>

    <nav id="tabs">
        <button class="tab active" data-target="x">
            <span class="icon">🐦</span> منصة X
        </button>
        <button class="tab" data-target="ig">
            <span class="icon">📸</span> إنستقرام
            <!-- Hidden Canvas for Image Processing -->
            <canvas id="canvas" width="1080" height="1080" style="display: none;"></canvas>

            <!-- Image Generation Modal -->
            <div id="image-modal" class="modal hidden">
                <div class="modal-content image-modal-content">
                    <h2>🎨 صورتك جاهزة</h2>
                    <div class="image-preview-container">
                        <img id="generated-image" src="" alt="Generated Ad" />
                    </div>
                    <div class="modal-actions">
                        <button id="download-btn" class="action-btn">📥 حفظ الصورة</button>
                        <button id="close-image-modal" class="action-btn secondary">إغلاق</button>
                    </div>
                    <p class="note">تم دمج الشعار تلقائياً ✨</p>
                </div>
            </div>

            <script src="script.js"></script>
</body>

</html>
