<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعلانات يومية لتطبيقك</title>
    <meta name="description" content="إعلانات عربية يومية لتغريدات X، إنستقرام، وتيك توك مجانية تمامًا.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>📢 إعلانات يومية جاهزة</h1>
            <p>انسخ وانشر مباشرة لتطبيقك!</p>
        </div>
    </header>

    <nav id="tabs">
        <button class="tab active" data-target="x">
            <span class="icon">🐦</span> منصة X
        </button>
        <button class="tab" data-target="ig">
            <span class="icon">📸</span> إنستقرام
        </button>
        <button class="tab" data-target="tiktok">
            <span class="icon">🎵</span> تيك توك
        </button>
    </nav>

    <!-- Daily Image Section -->
    <section id="daily-image-section" class="daily-image-section" style="display: none;">
        <div class="daily-image-card">
            <div class="daily-image-header">
                <h2>🖼️ صورة اليوم (AI)</h2>
                <p>صورة احترافية مخصصة لمنشورات اليوم</p>
            </div>
            <div id="daily-image-wrapper" class="daily-image-wrapper">
                <!-- Image will appear here -->
                <div class="placeholder-image">
                    <span>اضغط لتوليد صورة اليوم</span>
                </div>
            </div>
            <button id="generate-daily-btn" class="action-btn generate-daily-btn">
                ✨ توليد صورة حصرية لليوم
            </button>
        </div>
    </section>

    <main id="ad-container" class="ads-container">
        <!-- Ads will be injected here -->
    </main>

    <footer>
        <p>تم التطوير بواسطة ABO_OMAR | يتم التحديث يومياً 🤖</p>
    </footer>

    <!-- Hidden Canvas for Image Processing -->
    <canvas id="canvas" width="1080" height="1080" style="display: none;"></canvas>

    <!-- Image Generation Modal -->
    <div id="image-modal" class="modal hidden">
        <div class="modal-content image-modal-content">
            <h2>🎨 صورتك جاهزة</h2>
            <div class="image-preview-container">
                <img id="generated-image" src="" alt="Generated Ad" />
            </div>
            <div class="modal-actions">
                <button id="download-btn" class="action-btn">📥 حفظ الصورة</button>
                <button id="close-image-modal" class="action-btn secondary">إغلاق</button>
            </div>
            <p class="note">تم دمج الشعار تلقائياً ✨</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
